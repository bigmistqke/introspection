<!doctype html>
<html>
  <head>
    <title>Zustand Store</title>
  </head>
  <body>
    <div id="app">
      <p id="count">0</p>
      <p id="items"></p>
      <button id="increment">Increment</button>
      <button id="add-item">Add Item</button>
    </div>

    <script type="module">
      import { create } from 'zustand'
      import { devtools } from 'zustand/middleware'

      const useStore = create(
        devtools(
          (set) => ({
            count: 0,
            items: [],
            increment: () => set((state) => ({ count: state.count + 1 })),
            addItem: (item) => set((state) => ({ items: [...state.items, item] })),
          }),
          { name: 'zustand-store' }
        )
      )

      window.__TEST_STORE__ = useStore

      document.getElementById('increment').addEventListener('click', () => {
        useStore.getState().increment()
        document.getElementById('count').textContent = useStore.getState().count
      })

      document.getElementById('add-item').addEventListener('click', () => {
        useStore.getState().addItem(`item-${Date.now()}`)
        document.getElementById('items').textContent = useStore.getState().items.length
      })

      useStore.subscribe((state) => {
        document.getElementById('count').textContent = state.count
        document.getElementById('items').textContent = state.items.length
      })
    </script>
  </body>
</html>
