name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: 1
      TURBO_CACHE_MODE: off
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm dlx playwright install
      - run: pnpm build
      - run: pnpm test
      - run: pnpm typecheck

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - run: echo "GITHUB_SHA=${{ github.sha }}" >> $GITHUB_ENV
      - run: pnpx pkg-pr-new publish './packages/*' './plugins/*' --json "releases-${{ github.sha }}.json"
      - name: Update releases README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = JSON.parse(fs.readFileSync(`releases-${process.env.GITHUB_SHA}.json`, 'utf8'));
            const installCommands = content.packages
              .map(p => 'pnpm add ' + p.name + '@' + p.url)
              .join('\n');
            const overrides = content.packages
              .reduce((acc, p) => { acc[p.name] = p.url; return acc; }, {});
            const newEntry = '### [' + process.env.GITHUB_SHA + '](https://github.com/bigmistqke/introspection/commit/' + process.env.GITHUB_SHA + ')\n#### Install Commands\n\n```bash\n' + installCommands + '\n```\n\n#### Overrides\n\n```json\n' + JSON.stringify(overrides, null, 2) + '\n```\n';

            let readmeContent = '';
            try {
              const r = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'README.md',
                ref: 'releases'
              });
              const existing = Buffer.from(r.data.content, 'base64').toString('utf8');
              const lines = existing.split('\n');
              if (lines[0] === '# Continuous Releases') {
                lines.splice(0, 2);
              }
              readmeContent = '# Continuous Releases\n\n' + newEntry + lines.join('\n');
            } catch (e) {
              readmeContent = '# Continuous Releases\n\n' + newEntry;
            }

            const releasesRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/releases'
            }).then(r => r.data.object.sha).catch(() => null);

            if (!releasesRef) {
              throw new Error('releases branch not found. Please create it manually.');
            }

            const message = 'ci: releases ' + process.env.GITHUB_SHA.slice(0, 7);
            const tree = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: releasesRef,
              tree: [{ path: 'README.md', mode: '100644', content: readmeContent, type: 'blob' }]
            }).then(r => r.data.sha);

            const commit = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: message,
              tree: tree,
              parents: [releasesRef]
            }).then(r => r.data.sha);

            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/releases',
              sha: commit,
              force: true
            });
