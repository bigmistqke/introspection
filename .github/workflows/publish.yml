name: Publish packages
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - run: echo "GITHUB_SHA=${{ github.sha }}" >> $GITHUB_ENV
      - run: pnpx pkg-pr-new publish --compact './packages/*' --json "releases-${{ github.sha }}.json"
      - name: Update releases README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = JSON.parse(fs.readFileSync(`releases-${process.env.GITHUB_SHA}.json`, 'utf8'));
            const installCommands = Object.entries(content)
              .map(([pkg, url]) => 'pnpm add ' + pkg + '@' + url)
              .join('\n');
            const newEntry = '### ' + process.env.GITHUB_SHA + '\n```bash\n' + installCommands + '\n```\n';
            
            let readmeContent = '';
            try {
              const r = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'README.md',
                ref: 'releases'
              });
              const existing = Buffer.from(r.data.content, 'base64').toString('utf8');
              const lines = existing.split('\n');
              if (lines[0] === '# Continuous Releases') {
                lines.splice(0, 2);
              }
              readmeContent = '# Continuous Releases\n\n' + newEntry + lines.join('\n');
            } catch (e) {
              readmeContent = '# Continuous Releases\n\n' + newEntry;
            }
            
            const releasesRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/releases'
            }).then(r => r.data.object.sha).catch(() => null);
            
            if (!releasesRef) {
              throw new Error('releases branch not found. Please create it manually.');
            }
            
            const message = 'ci: releases ' + process.env.GITHUB_SHA.slice(0, 7);
            const tree = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: releasesRef,
              tree: [{ path: 'README.md', mode: '100644', content: readmeContent, type: 'blob' }]
            }).then(r => r.data.sha);
            
            const commit = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: message,
              tree: tree,
              parents: []
            }).then(r => r.data.sha);
            
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/releases',
              sha: commit,
              force: true
            });