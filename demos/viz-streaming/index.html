<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>viz-streaming</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 24px; }
    .controls { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
    .controls button {
      background: #222; border: 1px solid #333; color: #ccc; padding: 6px 14px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #2a2a2a; }
    .status { font-size: 12px; color: #555; margin-left: 8px; }
    .status.live { color: #8bc38b; }
    live-timeline { display: block; height: calc(100vh - 90px); }
  </style>
</head>
<body>
  <div class="controls">
    <button id="connect">Connect</button>
    <span class="status" id="status">Disconnected</span>
  </div>
  <live-timeline></live-timeline>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
