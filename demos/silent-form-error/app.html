<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout</title>
</head>
<body>
  <h1>Checkout</h1>
  <form id="payment-form">
    <label>
      Card number
      <input name="card" placeholder="1234 5678 9012 3456" autocomplete="off" />
    </label>
    <div data-testid="card-error" style="display:none;color:red"></div>
    <button type="submit">Pay now</button>
  </form>

  <script>
    async function apiPost(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body),
      })
      return { data: await response.json(), status: response.status }
    }

    function handlePaymentResponse(response) {
      const errors = response.data.errors
      const el = document.querySelector('[data-testid=card-error]')
      el.textContent = errors.map(error => error.message).join(', ')
      el.style.display = 'block'
    }

    document.getElementById('payment-form').addEventListener('submit', async (submitEvent) => {
      submitEvent.preventDefault()
      const card = submitEvent.target.querySelector('[name=card]').value
      apiPost('/api/payment/validate', { card })
        .then(handlePaymentResponse)
        .catch(() => {})
    })
  </script>
</body>
</html>
