<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>solid-streaming</title>
  <style>
    * { margin: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 24px; }
    .controls { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
    .controls button {
      background: #222; border: 1px solid #333; color: #ccc; padding: 6px 14px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #2a2a2a; }
    .status { font-size: 12px; color: #555; }
    .status.live { color: #8bc38b; }
    .count { font-size: 12px; color: #555; }
    .error-count { color: #fc6c6c; }
    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; height: calc(100vh - 90px); min-height: 300px; }
    .timeline { overflow-y: auto; background: #111; border-radius: 8px; padding: 12px; }
    .detail { background: #111; border-radius: 8px; padding: 16px; overflow-y: auto; }
    .event { display: grid; grid-template-columns: 60px 1fr; gap: 8px; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; line-height: 1.4; animation: slideIn 0.2s ease-out; }
    .event:hover { background: #1a1a1a; }
    .event.selected { background: #1e293b; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    .timestamp { color: #666; font-variant-numeric: tabular-nums; }
    .type { font-weight: 500; }
    .summary { color: #999; }
    .empty { color: #666; font-style: italic; }
    .field { margin-bottom: 8px; }
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 2px; }
    .value { font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; word-break: break-all; }
    pre { background: #0a0a0a; border-radius: 4px; padding: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; color: #ccc; }
    h3 { font-size: 14px; margin-bottom: 12px; color: #ccc; }
    .assets { margin-top: 16px; }
    .asset-card { background: #111; border-radius: 8px; padding: 12px; margin-bottom: 8px; animation: slideIn 0.2s ease-out; }
    .asset-header { display: flex; gap: 8px; align-items: center; font-size: 12px; margin-bottom: 8px; }
    .asset-kind { color: #c084fc; font-weight: 500; }
    .asset-path { color: #888; font-family: 'SF Mono', 'Fira Code', monospace; }
    .asset-size { color: #555; }
    .asset-content { max-height: 200px; overflow: auto; margin: 0; }
    .asset-loading { color: #555; font-size: 12px; font-style: italic; }
    .asset-binary { color: #555; font-size: 12px; font-style: italic; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/index.tsx"></script>
</body>
</html>
