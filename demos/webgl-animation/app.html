<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebGL Animation</title>
  <style>body { margin: 0; background: #000; }</style>
</head>
<body>
  <canvas id="canvas" width="400" height="400"></canvas>

  <script>
    class Clock {
      constructor() {
        this.startedAt = performance.now()
      }
      now() {
        return (performance.now() - this.startedAt) / 1000
      }
    }

    class AnimationLoop {
      constructor(gl, program) {
        this.gl = gl
        this.program = program
        this.clock = new Clock()
        this.running = true
        this.uTime = gl.getUniformLocation(program, 'u_time')
      }

      tick() {
        if (!this.running) return
        const time = this.clock.now()
        const gl = this.gl
        gl.clearColor(
          0.5 + 0.5 * Math.cos(time),
          0.5 + 0.5 * Math.sin(time),
          0.5 + 0.5 * Math.cos(time + 2.1),
          1.0
        )
        gl.clear(gl.COLOR_BUFFER_BIT)
        gl.uniform1f(this.uTime, time)
        gl.drawArrays(gl.TRIANGLES, 0, 3)
        requestAnimationFrame(() => this.tick())
      }

      start() {
        requestAnimationFrame(() => this.tick())
      }
    }

    const canvas = document.getElementById('canvas')
    const gl = canvas.getContext('webgl')

    const vs = gl.createShader(gl.VERTEX_SHADER)
    gl.shaderSource(vs, `
      uniform float u_time;
      attribute vec2 position;
      void main() {
        float c = cos(u_time);
        float s = sin(u_time);
        vec2 rotated = vec2(c * position.x - s * position.y, s * position.x + c * position.y);
        gl_Position = vec4(rotated * 0.8, 0.0, 1.0);
      }
    `)
    gl.compileShader(vs)

    const fs = gl.createShader(gl.FRAGMENT_SHADER)
    gl.shaderSource(fs, `
      precision mediump float;
      uniform float u_time;
      void main() {
        gl_FragColor = vec4(
          0.5 + 0.5 * cos(u_time),
          0.5 + 0.5 * sin(u_time),
          0.5 + 0.5 * cos(u_time + 2.1),
          1.0
        );
      }
    `)
    gl.compileShader(fs)

    const program = gl.createProgram()
    gl.attachShader(program, vs)
    gl.attachShader(program, fs)
    gl.linkProgram(program)
    gl.useProgram(program)

    const positionBuffer = gl.createBuffer()
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer)
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0, 0.8, -0.7, -0.5, 0.7, -0.5]), gl.STATIC_DRAW)
    const positionAttr = gl.getAttribLocation(program, 'position')
    gl.enableVertexAttribArray(positionAttr)
    gl.vertexAttribPointer(positionAttr, 2, gl.FLOAT, false, 0, 0)

    const loop = new AnimationLoop(gl, program)
    loop.start()

    setTimeout(() => {
      loop.clock = undefined
    }, 2000)
  </script>
</body>
</html>
