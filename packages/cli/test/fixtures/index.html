<!DOCTYPE html>
<html>
<head>
  <title>Test App</title>
</head>
<body>
  <button id="btn">Click me</button>
  <div id="result"></div>
  <script>
    document.getElementById('btn').addEventListener('click', () => {
      document.getElementById('result').textContent = 'Clicked!'
    })
  </script>
</body>
</html>
